name: CI

on:
  push:
    branches: [main, dev-hardening]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run tests (offline / deterministic — no live Hermes)
        env:
          HERMES_API_URL: ""
        run: pytest -q
